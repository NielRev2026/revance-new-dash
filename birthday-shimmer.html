<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Happy Birthday — Gold Shimmer · Revance Rewards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1c;
    --gold: #d3bc8d;
    --gold-dark: #a28d60;
    --gold-soft: #f4ecd9;
    --gold-mid: #e8c78a;
    --gray-800: #4d4d4d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { height: 100%; font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--ink); background: #111; overflow: hidden; }

  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .stage::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 30%, #2a2a2a, #0a0a0a 80%);
  }

  .device {
    position: relative; z-index: 2;
    width: 375px; height: 812px;
    background: linear-gradient(180deg, #ffffff 0%, #faf3e1 100%);
    border-radius: 44px; overflow: hidden;
    box-shadow: 0 60px 120px -20px rgba(0,0,0,0.55), 0 0 0 10px #1a1a1a, 0 0 0 11px #333;
    opacity: 0; transform: scale(0.94) translateY(12px);
    animation: reveal .8s cubic-bezier(.16,1,.3,1) forwards .1s;
  }
  @keyframes reveal { to { opacity: 1; transform: none; } }

  /* ─── header ─── */
  .header {
    position: absolute; top: 0; left: 0; right: 0; height: 120px;
    background: var(--ink); color: #fff;
    padding: 14px 20px 18px; z-index: 4;
  }
  .status { font-size: 13px; font-weight: 600; letter-spacing: -0.3px; padding-left: 8px; }
  .brand { position: absolute; left: 20px; bottom: 18px; display: flex; align-items: flex-end; gap: 10px; color: #fff; }
  .brand .mark { font-family: 'Playfair Display', 'Times New Roman', serif; font-style: italic; font-weight: 400; font-size: 34px; letter-spacing: -1px; line-height: 1; }
  .brand .word { font-size: 10px; font-weight: 500; letter-spacing: 2px; line-height: 1.2; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.35); }
  .brand .word span { display: block; }
  .close {
    position: absolute; top: 54px; right: 18px;
    width: 44px; height: 44px; border-radius: 50%;
    background: transparent; border: 1px solid rgba(255,255,255,0.35);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background .2s, transform .2s;
  }
  .close:hover { background: rgba(255,255,255,0.1); }
  .close:active { transform: scale(0.95); }
  .close svg { stroke: #fff; }

  /* ─── shimmer layer ─── */
  .shimmer-stage {
    position: absolute; top: 120px; left: 0; right: 0; height: 340px;
    z-index: 2; overflow: hidden;
  }

  /* the radial bloom — two layers breathing out of sync */
  .bloom {
    position: absolute; inset: -40px;
    background: radial-gradient(
      circle at 50% 48%,
      rgba(245, 230, 189, 0.95) 0%,
      rgba(232, 199, 138, 0.65) 18%,
      rgba(211, 188, 141, 0.35) 35%,
      rgba(211, 188, 141, 0.08) 60%,
      transparent 80%
    );
    filter: blur(2px);
    opacity: 0;
    animation: breathe 4.2s ease-in-out infinite, bloomIn 1.1s ease-out forwards;
    mix-blend-mode: multiply;
  }
  .bloom.b2 {
    background: radial-gradient(circle at 50% 45%, rgba(255,240,200,0.5), transparent 55%);
    animation-delay: .2s, 0s;
    animation-duration: 5.8s, 1.1s;
    mix-blend-mode: screen;
    filter: blur(8px);
  }
  @keyframes bloomIn { to { opacity: 1; } }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); filter: blur(4px); }
  }

  /* light rays — two conic sweeps */
  .rays {
    position: absolute; inset: 0;
    background: conic-gradient(
      from 0deg at 50% 50%,
      transparent 0deg,
      rgba(255, 240, 200, 0.14) 6deg,
      transparent 14deg,
      transparent 60deg,
      rgba(255, 240, 200, 0.10) 66deg,
      transparent 74deg,
      transparent 130deg,
      rgba(255, 240, 200, 0.14) 136deg,
      transparent 144deg,
      transparent 210deg,
      rgba(255, 240, 200, 0.10) 216deg,
      transparent 224deg,
      transparent 290deg,
      rgba(255, 240, 200, 0.14) 296deg,
      transparent 304deg
    );
    mask-image: radial-gradient(circle at 50% 50%, black 5%, transparent 70%);
    -webkit-mask-image: radial-gradient(circle at 50% 50%, black 5%, transparent 70%);
    animation: spin 60s linear infinite;
    opacity: .65;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* fine gold dust */
  .dust { position: absolute; inset: 0; pointer-events: none; }

  /* cake — sits above shimmer */
  .cake-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 3;
  }
  .cake { width: 200px; height: 230px; animation: floaty 3.8s ease-in-out infinite; filter: drop-shadow(0 18px 26px rgba(162, 141, 96, 0.28)); }
  @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  .flame { transform-origin: 50% 100%; animation: flicker 1s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { transform: scale(1, 1) rotate(-1deg); }
    50%      { transform: scale(0.94, 1.08) rotate(2deg); }
  }

  /* main sparkle — big 4-point over the candle */
  .main-sparkle {
    position: absolute; top: 42px; left: 50%;
    width: 140px; height: 140px;
    transform: translateX(-50%);
    z-index: 4; pointer-events: none;
  }
  .main-sparkle svg {
    width: 100%; height: 100%;
    animation: sparklePulse 2.6s ease-in-out infinite;
    transform-origin: center;
  }
  .main-sparkle svg.slow {
    position: absolute; inset: 0;
    animation: spinSlow 22s linear infinite;
  }
  @keyframes sparklePulse {
    0%, 100% { transform: scale(0.9); opacity: 0.75; }
    50%      { transform: scale(1.08); opacity: 1; }
  }
  @keyframes spinSlow { to { transform: rotate(360deg); } }

  /* ─── text blocks ─── */
  .text-block {
    position: absolute; top: 460px; left: 0; right: 0;
    text-align: center; padding: 0 24px;
    z-index: 4; opacity: 0; transform: translateY(10px);
    animation: rise .7s cubic-bezier(.16,1,.3,1) forwards .45s;
  }
  .greeting { font-size: 26px; font-weight: 300; letter-spacing: -0.3px; line-height: 1.1; }
  .name { font-size: 54px; font-weight: 500; letter-spacing: -1.6px; line-height: 1; margin-top: 4px; }
  .rule { width: 40px; height: 1px; background: var(--gold); margin: 16px auto 0; }

  .points-block {
    position: absolute; top: 612px; left: 0; right: 0;
    text-align: center; padding: 0 24px;
    z-index: 4; opacity: 0; transform: translateY(10px);
    animation: rise .7s cubic-bezier(.16,1,.3,1) forwards .7s;
  }
  .big {
    font-size: 48px; font-weight: 500; letter-spacing: -1px; line-height: 1.05;
    background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-mid) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    /* subtle sheen that travels across the text */
    position: relative;
  }
  .big::after {
    content: '+20 POINTS';
    position: absolute; inset: 0;
    background: linear-gradient(100deg,
      transparent 30%,
      rgba(255, 245, 210, 0.9) 50%,
      transparent 70%
    );
    background-size: 250% 100%;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: sheen 3.5s ease-in-out infinite;
    animation-delay: 1.1s;
  }
  @keyframes sheen {
    0%, 100% { background-position: 130% 0; opacity: 0; }
    40%      { background-position: 60% 0;  opacity: 1; }
    60%      { background-position: 20% 0;  opacity: 1; }
    80%      { background-position: -40% 0; opacity: 0; }
  }
  .small { margin-top: 6px; font-size: 14px; color: var(--gray-800); line-height: 1.4; }

  .continue {
    position: absolute; bottom: 36px; left: 16px; right: 16px;
    height: 48px;
    background: var(--ink); border: none; color: var(--gold);
    font-family: inherit; font-size: 13px; font-weight: 700;
    letter-spacing: 2.2px; text-transform: uppercase;
    cursor: pointer; z-index: 4;
    transition: transform .18s, background .2s;
    opacity: 0; transform: translateY(14px);
    animation: rise .7s cubic-bezier(.16,1,.3,1) forwards .95s;
  }
  .continue:hover { background: #2a2a2a; }
  .continue:active { transform: scale(0.985); }
  @keyframes rise { to { opacity: 1; transform: none; } }

  /* replay button */
  .replay {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    background: rgba(255,255,255,0.09); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
    color: #fff; padding: 12px 22px; border-radius: 40px;
    font-family: inherit; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity .4s, transform .3s;
  }
  .replay.show { opacity: 1; pointer-events: auto; }
  .replay:hover { background: rgba(211,188,141,0.2); border-color: var(--gold); }

  .device.closing { animation: dismiss .5s cubic-bezier(.7,0,.84,0) forwards; }
  @keyframes dismiss {
    to { opacity: 0; transform: scale(0.96) translateY(20px); }
  }

  /* side toggle (shimmer ↔ confetti) */
  .switcher {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 30; display: flex; gap: 2px; padding: 4px;
    background: rgba(255,255,255,0.08); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15); border-radius: 40px;
  }
  .switcher a {
    color: rgba(255,255,255,0.7); text-decoration: none;
    font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 18px; border-radius: 40px;
    transition: background .2s, color .2s;
  }
  .switcher a.active { background: var(--gold); color: #1c1c1c; }
  .switcher a:hover:not(.active) { color: #fff; }

  @media (max-width: 420px) {
    body { background: #fff; }
    .stage { padding: 0; }
    .stage::before { display: none; }
    .device { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
    .switcher { top: 12px; }
  }
</style>
</head>
<body>

<div class="switcher">
  <a href="birthday.html">Confetti</a>
  <a href="birthday-shimmer.html" class="active">Gold Shimmer</a>
</div>

<div class="stage">
  <div class="device" id="device">

    <header class="header">
      <div class="status">9:41</div>
      <div class="brand">
        <span class="mark">RA</span>
        <span class="word"><span>REVANCE</span><span>AESTHETICS.</span></span>
      </div>
      <button class="close" id="close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke-width="1.5" stroke-linecap="round">
          <path d="M1 1 L13 13 M13 1 L1 13"/>
        </svg>
      </button>
    </header>

    <div class="shimmer-stage">
      <div class="bloom"></div>
      <div class="bloom b2"></div>
      <div class="rays"></div>
      <canvas class="dust" id="dust"></canvas>

      <div class="main-sparkle">
        <!-- slow-rotating 4-point -->
        <svg class="slow" viewBox="-70 -70 140 140">
          <path d="M0 -58 L8 -8 L58 0 L8 8 L0 58 L-8 8 L-58 0 L-8 -8 Z" fill="url(#goldGrad1)" opacity="0.9"/>
          <defs>
            <radialGradient id="goldGrad1" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0%" stop-color="#fff4d1"/>
              <stop offset="55%" stop-color="#e8c78a"/>
              <stop offset="100%" stop-color="#a28d60"/>
            </radialGradient>
          </defs>
        </svg>
        <!-- pulsing 4-point -->
        <svg viewBox="-70 -70 140 140">
          <path d="M0 -40 L5 -5 L40 0 L5 5 L0 40 L-5 5 L-40 0 L-5 -5 Z" fill="#fff7dd" opacity="0.95"/>
        </svg>
      </div>

      <div class="cake-wrap">
        <svg class="cake" viewBox="0 0 200 230" fill="none">
          <rect x="10" y="215" width="180" height="10" rx="4" fill="#1c1c1c"/>
          <rect x="20" y="140" width="160" height="80" rx="8" fill="#f4ecd9"/>
          <rect x="20" y="140" width="160" height="7" fill="#d3bc8d"/>
          <path d="M40 147 C44 155 48 155 52 147" fill="#d3bc8d"/>
          <path d="M70 147 C74 157 78 157 82 147" fill="#d3bc8d"/>
          <path d="M100 147 C104 155 108 155 112 147" fill="#d3bc8d"/>
          <path d="M130 147 C134 158 138 158 142 147" fill="#d3bc8d"/>
          <path d="M160 147 C164 155 168 155 172 147" fill="#d3bc8d"/>
          <rect x="35" y="75" width="130" height="65" rx="8" fill="#faf1dd"/>
          <rect x="35" y="75" width="130" height="6" fill="#d3bc8d"/>
          <rect x="55" y="25" width="90" height="50" rx="6" fill="#ffffff" stroke="#ede3ca" stroke-width="1"/>
          <rect x="55" y="25" width="90" height="5" fill="#d3bc8d"/>
          <rect x="97" y="0" width="6" height="25" rx="2" fill="#1c1c1c"/>
          <rect x="97" y="10" width="6" height="2" fill="#d3bc8d"/>
          <g class="flame">
            <ellipse cx="100" cy="-5" rx="5" ry="10" fill="url(#flameGrad)"/>
            <ellipse cx="100" cy="-3" rx="2.5" ry="6" fill="#fff4a3"/>
          </g>
          <defs>
            <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
              <stop offset="0%" stop-color="#f2a534"/>
              <stop offset="100%" stop-color="#ffe68a"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>

    <div class="text-block">
      <p class="greeting">Happy Birthday,</p>
      <h1 class="name">Anna</h1>
      <div class="rule"></div>
    </div>

    <div class="points-block">
      <p class="big">+20 POINTS</p>
      <p class="small">Already added to your balance.</p>
    </div>

    <button class="continue" id="continue">Continue</button>
  </div>
</div>

<button class="replay" id="replay">↺ Show again</button>

<script>
  // ─── Dust canvas — fine twinkling gold specks + occasional pop sparkles ───
  const dust = document.getElementById('dust');
  const dctx = dust.getContext('2d');
  const device = document.getElementById('device');
  const replay = document.getElementById('replay');

  function fit() {
    const rect = dust.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    dust.width = rect.width * dpr;
    dust.height = rect.height * dpr;
    dctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w: rect.width, h: rect.height };
  }

  let dims = fit();
  window.addEventListener('resize', () => { dims = fit(); seedDust(); });

  const rand = (a, b) => a + Math.random() * (b - a);

  // dust = persistent tiny specks that twinkle (opacity sine wave)
  let specks = [];
  // pops = brief bright sparkles
  let pops = [];

  function seedDust() {
    specks = [];
    const count = 48;
    for (let i = 0; i < count; i++) {
      specks.push({
        x: rand(0, dims.w),
        y: rand(0, dims.h),
        r: rand(0.6, 2.2),
        phase: rand(0, Math.PI * 2),
        speed: rand(0.9, 1.8),    // twinkle speed (rad/s)
        drift: rand(-0.05, 0.05)
      });
    }
  }
  seedDust();

  // draw a 4-point sparkle (narrow diamond + cross)
  function drawSparkle(x, y, size, alpha, color) {
    dctx.save();
    dctx.translate(x, y);
    dctx.globalAlpha = alpha;
    dctx.fillStyle = color;
    dctx.beginPath();
    dctx.moveTo(0, -size);
    dctx.lineTo(size * 0.14, -size * 0.14);
    dctx.lineTo(size, 0);
    dctx.lineTo(size * 0.14, size * 0.14);
    dctx.lineTo(0, size);
    dctx.lineTo(-size * 0.14, size * 0.14);
    dctx.lineTo(-size, 0);
    dctx.lineTo(-size * 0.14, -size * 0.14);
    dctx.closePath();
    dctx.fill();
    dctx.restore();
  }

  let lastT = performance.now();
  let running = true;

  function tick(t) {
    if (!running) return;
    const dt = Math.min(0.05, (t - lastT) / 1000);
    lastT = t;
    dctx.clearRect(0, 0, dims.w, dims.h);

    // dust
    for (const s of specks) {
      s.phase += s.speed * dt;
      s.x += s.drift;
      if (s.x < -4) s.x = dims.w + 4;
      if (s.x > dims.w + 4) s.x = -4;
      const glow = (Math.sin(s.phase) + 1) / 2; // 0..1
      const alpha = 0.1 + glow * 0.75;
      // small radial glow
      dctx.save();
      dctx.globalAlpha = alpha;
      const g = dctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 3);
      g.addColorStop(0, 'rgba(255, 243, 200, 1)');
      g.addColorStop(0.45, 'rgba(232, 199, 138, 0.55)');
      g.addColorStop(1, 'rgba(211, 188, 141, 0)');
      dctx.fillStyle = g;
      dctx.beginPath();
      dctx.arc(s.x, s.y, s.r * 3, 0, Math.PI * 2);
      dctx.fill();
      // core dot
      dctx.fillStyle = 'rgba(255, 247, 217, ' + (0.5 + glow * 0.5) + ')';
      dctx.beginPath();
      dctx.arc(s.x, s.y, s.r * 0.7, 0, Math.PI * 2);
      dctx.fill();
      dctx.restore();
    }

    // pops — update + draw
    for (let i = pops.length - 1; i >= 0; i--) {
      const p = pops[i];
      p.age += dt;
      const prog = p.age / p.life;
      if (prog >= 1) { pops.splice(i, 1); continue; }
      // ease: fast grow, slow fade
      const scale = prog < 0.35 ? (prog / 0.35) : (1 - (prog - 0.35) / 0.65);
      const a = Math.max(0, Math.min(1, scale));
      drawSparkle(p.x, p.y, p.size * a, a, 'rgba(255, 243, 200, 1)');
      drawSparkle(p.x, p.y, p.size * a * 0.45, a, 'rgba(255, 255, 255, 1)');
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(t => { lastT = t; tick(t); });

  // periodically spawn pops at random positions, weighted toward center
  let popTimer = null;
  function scheduleNextPop() {
    const wait = rand(500, 1600);
    popTimer = setTimeout(() => {
      if (!running) return;
      // bias position toward middle
      const cx = dims.w / 2, cy = dims.h * 0.45;
      const x = cx + rand(-dims.w * 0.45, dims.w * 0.45) * (0.4 + Math.random() * 0.6);
      const y = cy + rand(-dims.h * 0.4, dims.h * 0.4) * (0.4 + Math.random() * 0.6);
      pops.push({ x, y, size: rand(8, 18), age: 0, life: rand(0.6, 1.0) });
      scheduleNextPop();
    }, wait);
  }
  scheduleNextPop();

  // click the cake for a fresh burst of pops
  document.querySelector('.cake').addEventListener('click', () => {
    const cx = dims.w / 2, cy = dims.h * 0.45;
    for (let i = 0; i < 10; i++) {
      pops.push({
        x: cx + rand(-60, 60),
        y: cy + rand(-40, 40),
        size: rand(10, 22), age: 0, life: rand(0.5, 0.9)
      });
    }
  });

  // ─── dismiss + replay ───
  function dismiss() {
    running = false;
    clearTimeout(popTimer);
    device.classList.add('closing');
    setTimeout(() => replay.classList.add('show'), 420);
  }
  function show() {
    device.classList.remove('closing');
    document.querySelectorAll('.text-block, .points-block, .continue').forEach(el => {
      el.style.animation = 'none';
      void el.offsetWidth;
      el.style.animation = '';
    });
    device.style.animation = 'none';
    void device.offsetWidth;
    device.style.animation = '';
    replay.classList.remove('show');
    running = true;
    pops = [];
    seedDust();
    requestAnimationFrame(t => { lastT = t; tick(t); });
    scheduleNextPop();
  }
  document.getElementById('close').addEventListener('click', dismiss);
  document.getElementById('continue').addEventListener('click', dismiss);
  replay.addEventListener('click', show);
</script>

</body>
</html>
